name: Setup workspace
description: >
  Install Nix, restore the pnpm and turbo caches, and install workspace
  dependencies. Shared by CI and the release jobs so cache behavior stays
  identical across all of them. Assumes the repository is already checked out.

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@v22
    - uses: DeterminateSystems/magic-nix-cache-action@v14
      with:
        use-flakehub: false
    # No-op that absorbs the first `nix develop` evaluation so its cost shows
    # up here instead of inflating the next real step.
    - name: Warm devShell
      shell: nix develop --command bash -eo pipefail {0}
      run: 'true'
    - name: Restore pnpm store
      uses: actions/cache@v6
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
    # Persist turbo's local cache so unchanged tasks are skipped across runs.
    # No remote cache: this is plain file-based caching, keyed per-commit with
    # a fallback to the most recent prior cache.
    - name: Restore turbo cache
      uses: actions/cache@v6
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-
    - name: Install dependencies
      shell: nix develop --command bash -eo pipefail {0}
      run: pnpm install --frozen-lockfile
