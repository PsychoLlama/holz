[global]
excludes = ["dist/**", "pnpm-lock.yaml"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = [
  "*.js",
  "*.mjs",
  "*.cjs",
  "*.ts",
  "*.tsx",
  "*.json",
  "*.md",
  "*.yaml",
  "*.yml",
  "*.css",
  "*.html",
]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]
